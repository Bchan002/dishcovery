<h1>Enter Your Email</h1>

<form [formGroup]="form" (submit)="processForm()">
    <table>
        <tr>
            <td>Email:</td>
            <td>
                <input type="email" formControlName="email">
            </td>
        </tr>
    </table>

    <br>

    <button type="submit">Submit</button>
</form>


<button type="button" [routerLink]="['/']">Back</button>
