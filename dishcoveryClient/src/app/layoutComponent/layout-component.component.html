<!-- Material Toolbar -->
<mat-toolbar color="primary" class="mat-elevation-z6 toolbar">
    <button mat-icon-button (click)="collapsed.set(!collapsed())" class="menu-button">
        <mat-icon>menu</mat-icon>
    </button>

    <span class="brand-title">Dishcovery</span>
    
    <span class="toolbar-spacer"></span>
    
    <!-- Logout button with icon -->
    <button mat-icon-button (click)="logout()" class="logout-button" matTooltip="Logout">
        <mat-icon>exit_to_app</mat-icon>
    </button>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
    <mat-sidenav opened mode="side" [style.width]="sidenavWidth()" class="sidenav">
        <app-custom-sidenav [collapsed]="collapsed()"></app-custom-sidenav>
    </mat-sidenav>
    
    <mat-sidenav-content class="content" [style.margin-left]="sidenavWidth()">
        <router-outlet></router-outlet>
    </mat-sidenav-content>
</mat-sidenav-container>

<!-- Footer -->
<footer class="footer">
    <p>© 2025 Dishcovery - Your Personal Smart Shopping List and Meal Assistant</p>
</footer>
